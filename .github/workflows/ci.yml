name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src --ext .ts,tsx

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npx next build
        env:
          UPSTASH_REDIS_REST_URL: ""
          UPSTASH_REDIS_REST_TOKEN: ""
          NEXT_PUBLIC_SENTRY_DSN: ""
          SENTRY_AUTH_TOKEN: ""
          SENTRY_ORG: ""
          SENTRY_PROJECT: ""

      - name: Check for unintended bundle size regression
        run: |
          BUILD_SIZE=$(du -sm .next | cut -f1)
          echo "Build size: ${BUILD_SIZE}MB"
          if [ "$BUILD_SIZE" -gt 200 ]; then
            echo "::error::Build size exceeds 200MB threshold (${BUILD_SIZE}MB)"
            exit 1
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality-gate

    env:
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_SENTRY_DSN: ''
      SENTRY_AUTH_TOKEN: ''
      SENTRY_ORG: ''
      SENTRY_PROJECT: ''

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build application
        run: npx next build

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        # --audit-level=critical: known accepted high-severity risks without available fix:
        # - xlsx (SheetJS): no fix available, core dependency, input pre-validated by file-validator
        # - minimatch (via @rocketseat/eslint-config@2.x): dev-only, requires ESLint 9 migration
        run: npm audit --audit-level=critical
