version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      tailwind:
        patterns:
          - "@tailwindcss/*"
          - "tw-animate-css"
          - "tailwind-merge"
          - "tailwindcss-animate"
      upstash:
        patterns:
          - "@upstash/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "@types/jest"
          - "jest"
          - "jest-*"
      vercel:
        patterns:
          - "@vercel/*"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@rocketseat/*"
      playwright:
        patterns:
          - "@playwright/*"
      types:
        patterns:
          - "@types/node"
          - "@types/papaparse"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - ci
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      github-actions:
        patterns:
          - "*"
